apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: kade-im-gateway
  namespace: istio-system
spec:
  selector:
    istio: ingressgateway
  servers:
    - hosts:
        - kade.im
        - wedding.kade.im
      port:
        name: https
        number: 443
        protocol: HTTPS
      tls:
        credentialName: istio-ingressgateway-certs
        mode: SIMPLE
    - hosts:
        - donghyun-jihye.com
        - "*.donghyun-jihye.com"
      port:
        name: https-dh
        number: 443
        protocol: HTTPS
      tls:
        credentialName: donghyun-jihye-certs
        mode: SIMPLE